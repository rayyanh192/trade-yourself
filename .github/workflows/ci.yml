name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Unit tests
        run: bun run test
        # Note: test:eval is intentionally NOT run in CI — it costs API credits.
        # Run it locally after rubric changes: bun run test:eval

      - name: Build
        run: bun run build
        env:
          # Build needs these to typecheck the supabase clients.
          # CI uses fake values — the build itself doesn't need to authenticate.
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key-for-ci
          ANTHROPIC_API_KEY: sk-ant-fake-for-ci
